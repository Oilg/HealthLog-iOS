name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    paths:
      - "HealthLogSync/**"
      - "HealthLogSyncTests/**"
      - "HealthLogSyncUITests/**"
      - "HealthLogSync.xcodeproj/**"
      - ".swiftlint.yml"
      - ".swiftformat"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (SwiftLint)
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  format:
    name: Format check (SwiftFormat)
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftFormat
        run: brew install swiftformat
      - name: Check formatting
        run: swiftformat HealthLogSync HealthLogSyncTests HealthLogSyncUITests --lint

  unit-tests:
    name: Unit tests + Coverage
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Select iOS simulator
        run: |
          set -euo pipefail
          # List only available iPhone devices, parse name + UDID, sort by iPhone number desc.
          # Prefer iPhone 17, fall back to next available iPhone (16, 15, ...).
          DEVICES_JSON=$(xcrun simctl list devices available --json)
          UDID=$(echo "$DEVICES_JSON" | python3 -c "
          import json, re, sys
          data = json.load(sys.stdin)
          candidates = []
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if not d.get('isAvailable'):
                      continue
                  name = d['name']
                  m = re.match(r'^iPhone (\d+)(.*)$', name)
                  if not m:
                      continue
                  major = int(m.group(1))
                  rest = m.group(2)
                  # Prefer plain models over Pro/Plus/Mini variants for determinism.
                  variant_rank = 0 if rest.strip() == '' else 1
                  candidates.append((major, variant_rank, name, d['udid']))
          if not candidates:
              sys.stderr.write('No available iPhone simulators found\n')
              sys.exit(1)
          # Highest major first; plain variant first within same major.
          candidates.sort(key=lambda c: (-c[0], c[1], c[2]))
          print(candidates[0][3])
          ")
          NAME=$(xcrun simctl list devices available | grep "$UDID" | head -n1 | sed -E 's/^[[:space:]]+//; s/ \(.*//')
          echo "Selected simulator: $NAME ($UDID)"
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
          # Boot the simulator (idempotent) and wait until it is ready.
          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID" -b
      - name: Run unit tests with coverage
        run: |
          xcodebuild test \
            -scheme HealthLogSyncTests \
            -project HealthLogSync.xcodeproj \
            -destination "id=$SIM_UDID" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
      - name: Check coverage gate (≥ 15%)
        run: |
          COVERAGE=$(xcrun xccov view --report --only-targets TestResults.xcresult \
            2>/dev/null | awk '/HealthLogSync\.app/ {gsub(/%/,""); print $2}')
          echo "Coverage: ${COVERAGE:-unknown}%"
          if [ -n "$COVERAGE" ] && awk "BEGIN {exit !($COVERAGE < 15)}"; then
            echo "::error::Coverage ${COVERAGE}% is below 15% gate"
            exit 1
          fi

  build-release:
    name: Build (Release)
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build release
        run: |
          xcodebuild build \
            -scheme HealthLogSync \
            -project HealthLogSync.xcodeproj \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

  static-analyzer:
    name: Static analyzer
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Run Xcode static analyzer
        run: |
          xcodebuild analyze \
            -scheme HealthLogSync \
            -project HealthLogSync.xcodeproj \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee analyze.log
          if grep -qE "clang-diagnostic-|AnalyzerResult" analyze.log; then
            echo "::error::Static analyzer found issues"
            grep -E "error:|clang-diagnostic-" analyze.log || true
            exit 1
          fi

  dead-code:
    name: Dead code (Periphery)
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery
      - name: Scan for dead code
        run: periphery scan --format github-actions --relative-results

  ui-tests:
    name: UI tests
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Select iOS simulator
        run: |
          set -euo pipefail
          DEVICES_JSON=$(xcrun simctl list devices available --json)
          UDID=$(echo "$DEVICES_JSON" | python3 -c "
          import json, re, sys
          data = json.load(sys.stdin)
          candidates = []
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              for d in devices:
                  if not d.get('isAvailable'):
                      continue
                  name = d['name']
                  m = re.match(r'^iPhone (\d+)(.*)$', name)
                  if not m:
                      continue
                  major = int(m.group(1))
                  rest = m.group(2)
                  variant_rank = 0 if rest.strip() == '' else 1
                  candidates.append((major, variant_rank, name, d['udid']))
          if not candidates:
              sys.stderr.write('No available iPhone simulators found\n')
              sys.exit(1)
          candidates.sort(key=lambda c: (-c[0], c[1], c[2]))
          print(candidates[0][3])
          ")
          NAME=$(xcrun simctl list devices available | grep "$UDID" | head -n1 | sed -E 's/^[[:space:]]+//; s/ \(.*//')
          echo "Selected simulator: $NAME ($UDID)"
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID" -b
      - name: Run UI tests
        run: |
          xcodebuild test \
            -scheme HealthLogSyncUITests \
            -project HealthLogSync.xcodeproj \
            -destination "id=$SIM_UDID" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO
